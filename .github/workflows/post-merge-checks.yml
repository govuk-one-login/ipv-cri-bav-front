name: Post merge checks

on:
  workflow_dispatch:
  push:
    branches:
      - main

env: # Only adding the variables in that are required for
  IPV_STUB_URL: ${{ secrets.IPV_STUB_URL }}
  API_BASE_URL: ${{ secrets.API_BASE_URL }}

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    continue-on-error: true

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout Project
        uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'

      - name: Checks if commiting secrets to repo
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: "detect-secrets --all-files"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      - name: Run lint
        run: yarn lint

      - name: Run build
        run: yarn build

      - name: Run test and write coverage
        run: yarn test

      - name: Run SonarCloud Scan
        if: ${{ success() && github.actor != 'dependabot[bot]' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Test CIC Front Image
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SH_BAV_ACCESS_TOKEN }}
        run: yarn install --frozen-lockfile

      - name: Build production bundle
        run: yarn build

      - name: Test the app
        id: bavBrowserTests
        run: yarn test:browser:ci

      # - name: Kill leftover app process
      #   if: always()
      #   run: pkill -f "node .*src/app.js" || true

      - name: Generate HTML Report
        if: always() && steps.bavBrowserTests.outcome == 'failure'
        run: yarn test:browser:report

      - name: Upload browser report artifact
        if: always() && steps.bavBrowserTests.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: bav-cri-test-report
          path: test/reports/bav-reports